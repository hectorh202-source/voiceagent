services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - DATABASE_PATH=/data/app.db
      # Optional but strongly recommended — see .env.example and
      # docs/sqlite-storage.md#the-encryption-key-itself. Sourced from a
      # .env file next to this docker-compose.yml (gitignored, VPS-only),
      # which Docker Compose reads automatically for ${...} substitution.
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - app-data:/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
